<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Applebee's | Acceso Gerente</title>
  <link rel="stylesheet" href="css/login-manager.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
  <main class="manager-login-page">
    <section class="manager-login-card">
      <div class="logo-wrap">
        <img src="assets/Applebeewine.png" alt="Applebee's Logo" class="logo" />
      </div>

      <div class="header">
        <span class="badge">ACCESO INTERNO</span>
        <h1>Panel Gerente / Caja</h1>
        <p>Ingresa con tu cuenta autorizada para validar compras y visitas.</p>
      </div>

      <form id="managerLoginForm" class="form">
        <div class="input-group">
          <label for="managerEmail">Correo</label>
          <input type="email" id="managerEmail" placeholder="gerente@applebees.com" required />
        </div>

        <div class="input-group">
          <label for="managerPassword">Contraseña</label>
          <div class="password-wrap">
            <input type="password" id="managerPassword" placeholder="••••••••" required />
            <button type="button" id="toggleManagerPassword" class="toggle-btn">Ver</button>
          </div>
        </div>

        <button type="submit" class="btn-primary">Entrar al panel</button>
        <div id="managerLoginMessage" class="message"></div>
      </form>
    </section>
  </main>

  <script type="module" src="js/login-manager.js"></script>
</body>
</html>
